<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Mission - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full">
      <!-- Main Card -->
      <div
        class="bg-slate-800 rounded-lg shadow-2xl border border-slate-700 overflow-hidden"
      >
        <!-- Header -->
        <div
          class="bg-gradient-to-r from-red-900 to-slate-900 p-6 border-b border-slate-700"
        >
          <h1
            class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-400 mb-2"
          >
            🕵️ SECRET MISSION
          </h1>
          <p class="text-slate-300 text-lg">
            Command Center - Initialize Operation
          </p>
        </div>

        <!-- Content -->
        <div class="p-8">
          <div
            class="bg-slate-900/50 rounded-lg p-6 border border-slate-700 mb-6"
          >
            <p class="text-slate-300 text-lg mb-4">
              <span class="text-red-400 font-semibold">CLASSIFIED:</span> You
              are about to initiate a covert operation.
            </p>
            <p class="text-slate-400">
              Assemble your team of operatives and resistance fighters. Some
              among you may be double agents...
            </p>
          </div>

          <form
            action="{{ url_for('create_session') }}"
            method="post"
            class="space-y-6"
          >
            <div>
              <label
                for="player_count"
                class="block text-slate-300 font-semibold mb-3 text-lg"
              >
                Number of Operatives:
              </label>
              <select
                name="player_count"
                id="player_count"
                required
                class="w-full bg-slate-900 border-2 border-slate-700 text-white rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all"
              >
                <option value="5">5 Operatives</option>
                <option value="6">6 Operatives</option>
                <option value="7">7 Operatives</option>
                <option value="8">8 Operatives</option>
                <option value="9">9 Operatives</option>
                <option value="10">10 Operatives</option>
              </select>
            </div>

            <!-- Special Roles Selection -->
            <div class="bg-slate-900/50 rounded-lg p-6 border border-slate-700">
              <h3 class="text-slate-200 font-semibold mb-4 text-lg">
                Special Roles (Optional)
              </h3>

              <!-- Resistance Special Roles -->
              <div class="mb-4">
                <p class="text-green-400 font-semibold mb-2">Resistance:</p>
                <div class="space-y-2 ml-4">
                  <label class="flex items-start text-slate-300 cursor-pointer">
                    <input
                      type="checkbox"
                      name="commander"
                      value="1"
                      class="mt-1 mr-3 w-4 h-4"
                      {% if special_roles["commander"] %}checked{% endif %}
                    />
                    <div>
                      <span class="font-semibold">Commander</span>
                      <p class="text-sm text-slate-500">
                        Knows all spies (target for Assassin)
                      </p>
                    </div>
                  </label>
                  <label class="flex items-start text-slate-300 cursor-pointer">
                    <input
                      type="checkbox"
                      name="bodyguard"
                      value="1"
                      class="mt-1 mr-3 w-4 h-4"
                      {% if special_roles["bodyguard"] %}checked{% endif %}
                    />
                    <div>
                      <span class="font-semibold">Bodyguard</span>
                      <p class="text-sm text-slate-500">
                        Knows the Commander (requires Commander)
                      </p>
                    </div>
                  </label>
                </div>
              </div>

              <!-- Spy Special Roles -->
              <div>
                <p class="text-red-400 font-semibold mb-2">Spies:</p>
                <div class="space-y-2 ml-4">
                  <label class="flex items-start text-slate-300 cursor-pointer">
                    <input
                      type="checkbox"
                      name="assassin"
                      value="1"
                      class="mt-1 mr-3 w-4 h-4"
                      {% if special_roles["assassin"] %}checked{% endif %}
                    />
                    <div>
                      <span class="font-semibold">Assassin</span>
                      <p class="text-sm text-slate-500">
                        Can shoot Commander if Resistance wins
                      </p>
                    </div>
                  </label>
                  <label class="flex items-start text-slate-300 cursor-pointer">
                    <input
                      type="checkbox"
                      name="false_commander"
                      value="1"
                      class="mt-1 mr-3 w-4 h-4"
                      {% if special_roles["false_commander"] %}checked{% endif %}
                    />
                    <div>
                      <span class="font-semibold">False Commander</span>
                      <p class="text-sm text-slate-500">
                        Appears as Commander to Bodyguard
                      </p>
                    </div>
                  </label>
                  <label class="flex items-start text-slate-300 cursor-pointer">
                    <input
                      type="checkbox"
                      name="deep_cover"
                      value="1"
                      class="mt-1 mr-3 w-4 h-4"
                      {% if special_roles["deep_cover"] %}checked{% endif %}
                    />
                    <div>
                      <span class="font-semibold">Deep Cover</span>
                      <p class="text-sm text-slate-500">
                        Hidden from Commander's knowledge
                      </p>
                    </div>
                  </label>
                  <label class="flex items-start text-slate-300 cursor-pointer">
                    <input
                      type="checkbox"
                      name="blind_spy"
                      value="1"
                      class="mt-1 mr-3 w-4 h-4"
                      {% if special_roles["blind_spy"] %}checked{% endif %}
                    />
                    <div>
                      <span class="font-semibold">Blind Spy</span>
                      <p class="text-sm text-slate-500">
                        Doesn't know other spies
                      </p>
                    </div>
                  </label>
                </div>
              </div>
            </div>

            <button
              type="submit"
              class="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-bold py-4 px-6 rounded-lg shadow-lg transform transition-all duration-200 hover:scale-105 focus:outline-none focus:ring-4 focus:ring-red-500/50 text-lg"
            >
              CREATE CLASSIFIED SESSION
            </button>
          </form>
          <script>
            window.addEventListener('beforeunload', () => {
              sessionStorage.setItem('sidebar-scroll', window.scrollY);
            });

            window.addEventListener('load', () => {
              const scrollPos = sessionStorage.getItem('sidebar-scroll');
              if (scrollPos) {
                window.scrollTo(0, parseInt(scrollPos));
                sessionStorage.removeItem('sidebar-scroll');
              }
            });
          </script>
        </div>
      </div>

      <!-- Footer Note -->
      <div class="text-center mt-6 text-slate-500 text-sm">
        <p>Secure Connection Established</p>
      </div>
    </div>
  </body>
</html>
